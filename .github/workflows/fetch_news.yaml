name: Daily News Fetch

on:
  schedule:
    - cron: '0 10 * * *'  # 10:00 AM UTC = 6:00 AM Trinidad & Tobago time (UTC-4)
  workflow_dispatch:       # Allows manual trigger from GitHub Actions tab

jobs:
  fetch-news:
    runs-on: ubuntu-latest

    permissions:
      contents: write      # Needed to commit and push the new CSV back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install feedparser pandas

      - name: Run news fetcher
        run: |
          python "Learning-Lab/02-apps/T&T-News-Aggregator/tt-news-rss-feeds.py"

      - name: Commit and push new CSV
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily news fetch - $(date +'%Y-%m-%d')"
          git push
